<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Clone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f9f9f9;
}

/* NAVBAR */
.navbar{
    position:fixed;
    top:0;
    width:100%;
    height:60px;
    background:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    border-bottom:1px solid #ddd;
}

.logo{
    font-size:22px;
    font-weight:bold;
    color:red;
}

.search-bar{
    display:flex;
    width:40%;
}

.search-bar input{
    flex:1;
    padding:8px;
    border:1px solid #ccc;
    border-right:none;
}

.search-bar button{
    padding:8px 15px;
    border:1px solid #ccc;
    background:#eee;
    cursor:pointer;
}

.icons span{
    margin-left:15px;
    cursor:pointer;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    top:60px;
    left:0;
    width:200px;
    height:100%;
    background:#ffffff;
    border-right:1px solid #ddd;
    padding:20px 10px;
}

.sidebar p{
    margin:15px 0;
    cursor:pointer;
}

/* MAIN CONTENT */
.main{
    margin-top:70px;
    margin-left:220px;
    padding:20px;
}

.video-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
    gap:20px;
}

.video-card{
    background:#fff;
    padding-bottom:10px;
}

.thumbnail{
    width:100%;
    height:150px;
    background:#ccc;
}

.video-info{
    display:flex;
    padding:10px;
}

.video-info img{
    width:40px;
    height:40px;
    border-radius:50%;
    margin-right:10px;
}

.video-title{
    font-weight:bold;
    font-size:14px;
}

.channel-name{
    font-size:13px;
    color:gray;
}

/* RESPONSIVE */
@media(max-width:800px){
    .sidebar{
        display:none;
    }
    .main{
        margin-left:0;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">YouTube</div>
    <div class="search-bar">
        <input type="text" placeholder="Search">
        <button>🔍</button>
    </div>
    <div class="icons">
        <span>🎥</span>
        <span>🔔</span>
        <span>👤</span>
    </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
    <p>🏠 Home</p>
    <p>🔥 Trending</p>
    <p>📺 Subscriptions</p>
    <p>📚 Library</p>
</div>

<!-- MAIN CONTENT -->
<div class="main">
    <div class="video-grid">

        <!-- VIDEO CARD -->
        <div class="video-card">
            <div class="thumbnail"></div>
            <div class="video-info">
                <img src="https://media.istockphoto.com/id/1047259374/photo/programming-source-code-abstract-background.jpg?s=1024x1024&w=is&k=20&c=EUIT1eazlH-IFNzY7gKwk-Bj0RXiBd2R_k8s5Sq6FCU">
                <div>
                    <div class="video-title">Learn HTML in 10 Minutes</div>
                    <div class="channel-name">Code Master</div>
                    <div class="channel-name">1M views • 2 days ago</div>
                </div>
            </div>
        </div>

        <div class="video-card">
            <div class="thumbnail"></div>
            <div class="video-info">
                <img src="https://i.pravatar.cc/40?img=11">
                <div>
                    <div class="video-title">CSS Flexbox Tutorial</div>
                    <div class="channel-name">Web School</div>
                    <div class="channel-name">500K views • 1 week ago</div>
                </div>
            </div>
        </div>

        <div class="video-card">
            <div class="thumbnail"></div>
            <div class="video-info">
                <img src="https://i.pravatar.cc/40?img=12">
                <div>
                    <div class="video-title">Build Website Without JavaScript</div>
                    <div class="channel-name">Design Pro</div>
                    <div class="channel-name">250K views • 3 days ago</div>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
